    // Collection to store polygon data for circle conversion
    var polygonsData = [];
    var circlesLayerGroup = L.layerGroup();
    var currentDisplayMode = 'polygons'; // 'polygons' or 'circles'

    // Function to calculate polygon centroid
    function calculateCentroid(coords) {
        var sumLat = 0, sumLng = 0;
        for (var i = 0; i < coords.length; i++) {
            sumLat += coords[i][0];
            sumLng += coords[i][1];
        }
        return [sumLat / coords.length, sumLng / coords.length];
    }

    // Extract all polygons from the map and store their data
    map_0a42f21ca922851fb64aa9e3ec6ea027.eachLayer(function(layer) {
        if (layer instanceof L.Polygon && !(layer instanceof L.Rectangle)) {
            var coords = layer.getLatLngs()[0];
            var popupContent = layer._popup ? layer._popup._content : 'Zone';
            var label = popupContent ? popupContent.textContent || popupContent.innerText || 'Zone' : 'Zone';
            
            polygonsData.push({
                polygon: layer,
                coordinates: coords,
                label: label,
                centroid: calculateCentroid(coords)
            });
        }
    });

    // Create circles based on polygon data
    function createCircles() {
        circlesLayerGroup.clearLayers();

                '<div style="width: 100.0%; height: 100.0%;">' + data.label + '</div>'
            ));
            
            circle.addTo(circlesLayerGroup);
        });
