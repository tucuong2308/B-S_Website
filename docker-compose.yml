version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "8"
      POSTGRES_DB: batdongsan_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d batdongsan_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./Server # ✅ build local, không dùng GHCR nữa
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_DRIVER: postgresql
      DB_USERNAME: postgres
      DB_PASSWORD: "8"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: batdongsan_db
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MAPBOX_API_KEY: ${MAPBOX_API_KEY:-}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http server:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - server

volumes:
  pgdata:
